services:
  db:
    image: postgres:17-alpine
    container_name: sensor-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-sensor_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: sensor-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-sensor_dashboard}
    depends_on:
      - db

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: sensor-frontend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-sensor_dashboard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://localhost:3000
      SENSOR_API_KEY: ${SENSOR_API_KEY}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  simulator:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: sensor-simulator
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-sensor_dashboard}
      API_URL: http://frontend:3000/api/ingest
      SENSOR_API_KEY: ${SENSOR_API_KEY}
    depends_on:
      - backend
    command: ["/app/.venv/bin/python", "-m", "app.simulator"]

volumes:
  postgres_data:
