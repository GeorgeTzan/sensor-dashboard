services:
  db:
    image: postgres:17-alpine
    container_name: sensor-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-sensor_dashboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: sensor-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-sensor_dashboard}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: sensor-frontend
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-sensor_dashboard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
